<!DOCTYPE html>

<title>MVS Tree Services | Houston TX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
padding-bottom:120px;
}

/* HERO */
.hero{
height:350px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:#000;
}

.logo{
width:180px;
border-radius:50%;
box-shadow:0 0 25px #00ff88;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#00ff88;
font-weight:bold;
text-shadow:0 0 10px #00ff88;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:12px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00ff88;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.gallery img,
.gallery video{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.lightbox img,
.lightbox video{
max-width:90%;
max-height:80%;
}

/* FLOAT BUTTONS */
.floating{
position:fixed;
right:15px;
bottom:20px;
display:flex;
flex-direction:column;
gap:12px;
z-index:9999;
}

.floating a{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:22px;
color:white;
text-decoration:none;
}

.call{ background:#00ff88; color:black; }
.whatsapp{ background:#25D366; }
.instagram{ background:#E1306C; }
.tiktok{ background:black; border:1px solid white; }
</style>
</head>

<script>
function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightImg").style.display="block";
document.getElementById("lightVideo").style.display="none";
document.getElementById("lightImg").src = src;
}

function openVideo(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightVideo").style.display="block";
document.getElementById("lightImg").style.display="none";
document.getElementById("lightVideo").src = src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
document.getElementById("lightVideo").pause();
}
</script>
